# /etc/network/interfaces — Proxmox VE
# Replace enp1s0 with your actual NIC name (ip link show to find it)

auto lo
iface lo inet loopback

auto enp1s0
iface enp1s0 inet manual

# vmbr0 — Management bridge — VLAN 30
# Pi-hole, Wazuh, OpenVAS, Proxmox management all here
auto vmbr0
iface vmbr0 inet static
    address 192.168.30.10/24
    gateway 192.168.30.1
    bridge-ports enp1s0
    bridge-stp off
    bridge-fd 0
    bridge-vlan-aware yes
    bridge-vids 30

# vmbr2 — Isolated cyber lab — NO port, NO uplink, NO routing out
auto vmbr2
iface vmbr2 inet manual
    bridge-ports none
    bridge-stp off
    bridge-fd 0

# Static route: lab VMs can push logs to Wazuh (port 1514) ONLY
post-up   ip route add 10.10.10.0/24 via 192.168.30.20 dev vmbr0
pre-down  ip route del 10.10.10.0/24 via 192.168.30.20 dev vmbr0
